

<body>

    <h1>User Registration Form</h1>

    <form action="#" method="post">

        <!-- Full Name -->
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname"
               required minlength="3" maxlength="30"
               placeholder="Enter your full name"><br><br>

        <!-- Email -->
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"
               required placeholder="example@gmail.com"><br><br>

        <!-- Password -->
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password"
               required minlength="6"
               placeholder="Enter strong password"><br><br>

        <!-- Date of Birth -->
        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob" required><br><br>

        <!-- Gender -->
        <label>Gender:</label><br>

        <input type="radio" id="male" name="gender" value="Male" required>
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>

        <br><br>

        <!-- Country -->
        <label for="country">Country:</label><br>
        <select id="country" name="country" required>
            <option value="">-- Select Country --</option>
            <option value="Palestine">Palestine</option>
            <option value="Jordan">Jordan</option>
            <option value="Egypt">Egypt</option>
            <option value="Saudi Arabia">Saudi Arabia</option>
        </select>

        <br><br>

        <!-- Skills -->
        <label>Skills:</label><br>

        <input type="checkbox" id="html" name="skills" value="HTML">
        <label for="html">HTML</label>

        <input type="checkbox" id="css" name="skills" value="CSS">
        <label for="css">CSS</label>

        <input type="checkbox" id="js" name="skills" value="JavaScript">
        <label for="js">JavaScript</label>

        <br><br>

        <!-- Experience -->
        <label for="experience">Experience Level:</label><br>
        <input type="range" id="experience" name="experience" min="0" max="10">

        <br><br>

        <!-- File Upload -->
        <label for="photo">Upload Profile Picture:</label><br>
        <input type="file" id="photo" name="photo" accept="image/*">

        <br><br>

        <!-- About -->
        <label for="about">About Yourself:</label><br>
        <textarea id="about" name="about" rows="5" cols="40"
                  placeholder="Write something about yourself..." required></textarea>

        <br><br>

        <!-- Buttons -->
        <input type="submit" value="Register">
        <input type="reset" value="Clear">

    </form>

</body>
</html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
</head>
